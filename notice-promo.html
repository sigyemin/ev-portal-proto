<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>홍보자료 | 알림·공지 | 무공해차 통합누리집</title>
<link rel="stylesheet" href="css/style.css?v=20260622">
<link rel="stylesheet" href="css/ai-floating.css">
<link rel="stylesheet" href="css/board.css">
<link rel="stylesheet" href="css/notice.css">
<link rel="stylesheet" href="css/info.css">
<style>
  .cat-chip.promo{background:#fbeaf0;color:#b03a5b}
  /* 홍보자료 카드형 — 이미지 중심 */
  .promo-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-top:4px;}
  .promo-card{display:flex;flex-direction:column;height:330px;background:#fff;border:1px solid var(--border-light);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .2s,border-color .2s;}
  .promo-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--color-primary-300,#9fd9c2);}
  .promo-card:focus-visible{outline:2px solid var(--color-primary-500);outline-offset:2px;}
  .promo-thumb{flex:0 0 60%;position:relative;display:grid;place-items:center;background:var(--color-gray-100);color:var(--color-gray-400);}
  .promo-thumb img{width:100%;height:100%;object-fit:cover;}
  .promo-thumb svg{width:48px;height:48px;}
  .promo-thumb .new-tag{position:absolute;top:10px;left:10px;}
  .promo-body{flex:1 1 40%;min-height:0;padding:16px;display:flex;flex-direction:column;justify-content:center;gap:8px;}
  .promo-title{font-size:18px;font-weight:700;line-height:1.35;letter-spacing:-.01em;color:var(--text-primary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .promo-meta{display:flex;gap:8px;align-items:center;font-size:12.5px;color:var(--text-tertiary);}
  .promo-meta .dot{width:2px;height:2px;border-radius:50%;background:var(--border-medium);}
  @media (max-width:520px){ .promo-cards{grid-template-columns:1fr 1fr;gap:12px;} .promo-card{height:270px;} .promo-title{font-size:16px;} }
</style>
</head>
<body>
<a href="#main" class="skip-link" data-i18n="skip.tocontent">본문 바로가기</a>
<script>window.__activeNav = 'community';</script>
<div id="header-slot"></div>

<main id="main">
  <section class="page-hero compact">
    <div class="container container-wide">
      <nav class="breadcrumb" aria-label="경로">
        <a href="notice-list.html">소통·지원</a><span class="sep" aria-hidden="true">›</span>
        <a href="notice-list.html">알림·공지</a><span class="sep" aria-hidden="true">›</span>
        <span class="current" aria-current="page">홍보자료</span>
      </nav>
      <h1>홍보자료</h1>
      <p class="hero-lead">무공해차 전환을 알리는 영상·카드뉴스·캠페인 등 홍보자료를 제공합니다. 자유롭게 활용하실 수 있습니다.</p>
    </div>
  </section>

  <section class="section-sm">
    <div class="container container-wide">

      <div class="board-toolbar">
        <div class="board-toolbar-filters">
          <!-- 분류 컬럼 없는 게시판: 카테고리(분류) 필터·컬럼 제거. 기간·검색만 유지 -->
          <div class="form-group">
            <label class="form-label">기간</label>
            <select class="form-select" id="pmPeriod" aria-label="기간">
              <option value="all">전체 기간</option>
              <option value="30">최근 1개월</option>
              <option value="90">최근 3개월</option>
              <option value="180">최근 6개월</option>
            </select>
          </div>
          <div class="board-search">
            <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="pmSearch" placeholder="제목·내용 검색" aria-label="검색어 입력">
            <button type="button" id="pmSearchBtn">검색</button>
          </div>
          <button class="btn" type="button" id="pmReset" aria-label="필터 초기화">초기화</button>
        </div>
      </div>

      <div class="board-result-meta" style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
        <div>전체 <strong id="pmCount">0</strong>건</div>
        <div class="btn-group" data-view-toggle="#promo-views" role="group" aria-label="보기 방식 전환">
          <button class="btn" data-view="table" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            <span>표형</span>
          </button>
          <button class="btn active" data-view="card" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span>카드형</span>
          </button>
        </div>
      </div>

      <div id="promo-views">
        <!-- 카드형 (기본) — 썸네일은 실제 이미지 연동 전 종류별 플레이스홀더 -->
        <div data-view-panel="card">
          <div class="promo-cards" id="pmCards"></div>
        </div>
        <!-- 표형 (게시판 유지) -->
        <div data-view-panel="table" style="display:none;">
          <table class="board-table std-board" id="pmTable">
            <thead>
              <tr>
                <th class="num">번호</th>
                <th>게시물명</th>
                <th class="writer">작성자</th>
                <th class="date">등록일</th>
                <th class="views">조회</th>
                <th class="attach">첨부파일</th>
              </tr>
            </thead>
            <tbody id="pmBody"></tbody>
          </table>
        </div>
      </div>

      <div class="pagination" data-total="1" data-current="1" style="margin-top:20px;"></div>

      <div id="pmEmpty" class="board-empty" style="display:none;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <h4>검색 결과가 없습니다</h4>
        <p>다른 검색어를 입력하시거나 필터를 변경해 주세요.</p>
      </div>

    </div>
  </section>
</main>

<!-- 첨부파일 다운로드 팝업 (일반자료실과 동일 컴포넌트) -->
<div class="modal-backdrop" data-for="libDownloadModal"></div>
<div class="modal" id="libDownloadModal" role="dialog" aria-modal="true" aria-labelledby="libDlTitle" aria-hidden="true">
  <div class="modal-header">
    <h3 id="libDlTitle">첨부파일 다운로드</h3>
    <button class="modal-close" type="button" data-modal-close aria-label="팝업 닫기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="modal-body">
    <p id="libDlDocName"></p>
    <div class="lib-dl-selectall">
      <label><input type="checkbox" id="libDlAll"> 전체 선택</label>
      <span id="libDlCount" aria-live="polite">0개 선택</span>
    </div>
    <ul class="lib-file-list" id="libFileList" role="group" aria-label="첨부파일 목록"></ul>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" type="button" data-modal-close>닫기</button>
    <button class="btn btn-primary" type="button" id="libDlSelected">선택 다운로드</button>
  </div>
</div>

<div id="footer-slot"></div>
<script src="js/partials.js?v=20260721a"></script>
<script src="js/i18n.js?v=20260520"></script>
<script src="js/i18n-common.js?v=20260721a"></script>
<script src="js/i18n-notice.js?v=20260520"></script>
<script src="js/news-data.js?v=20260613"></script>
<script src="js/main.js?v=20260520"></script>
<script src="js/board-standard.js"></script>
<script src="js/ai-floating.js?v=20260626d"></script>
<script>
(function () {
  var ITEMS = Object.values(window.NEWS_ITEMS || {}).filter(function (n) { return n.cat === 'promo'; });
  function kindLabel(n) { return n.kind === '카드뉴스' ? '새소식' : (n.kind || '홍보'); }
  function daysAgo(n) { var p = (n.date || '').split('.'); if (p.length < 3) return 9999; var d = new Date(+p[0], +p[1] - 1, +p[2]); return Math.floor((Date.now() - d.getTime()) / 86400000); }
  function esc(s){ return String(s).replace(/"/g,'&quot;'); }

  var body = document.getElementById('pmBody');
  var count = document.getElementById('pmCount');
  var empty = document.getElementById('pmEmpty');
  var periodSel = document.getElementById('pmPeriod'),
      search = document.getElementById('pmSearch'),
      searchBtn = document.getElementById('pmSearchBtn'), reset = document.getElementById('pmReset');

  function render() {
    var kw = (search.value || '').trim().toLowerCase();
    var p = periodSel.value;
    var list = ITEMS.filter(function (n) {
      var okP = p === 'all' || daysAgo(n) <= parseInt(p, 10);
      var okKw = !kw || (n.title + n.desc).toLowerCase().indexOf(kw) >= 0;
      return okP && okKw;
    });
    list.sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });
    body.innerHTML = list.map(function (n, i) {
      var dl = n.attach
        ? '<button type="button" class="lib-dl-btn" data-doc="' + esc(n.title) + '" data-files=\'[{"name":"' + esc(n.title) + '.zip","size":"ZIP"}]\' aria-haspopup="dialog">다운로드</button>'
        : '-';
      return '<tr data-id="' + n.id + '">' +
        '<td class="num">' + (list.length - i) + '</td>' +
        '<td><div class="title-cell">' + (daysAgo(n) <= 21 ? '<span class="new-tag">NEW</span>' : '') + n.title + '</div></td>' +
        '<td class="writer">환경부</td>' +
        '<td class="date">' + n.date + '</td>' +
        '<td class="views">' + (n.views || '0') + '</td>' +
        '<td class="attach">' + dl + '</td>' +
        '</tr>';
    }).join('');

    var THUMB_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="9" r="1.7"/><path d="M21 15l-5-5L5 21"/></svg>';
    var cards = document.getElementById('pmCards');
    if (cards) cards.innerHTML = list.map(function (n) {
      var thumb = n.thumb ? '<img src="' + esc(n.thumb) + '" alt="">' : THUMB_ICON;
      return '<div class="promo-card" data-id="' + n.id + '" tabindex="0" role="link" aria-label="' + esc(n.title) + '">' +
        '<div class="promo-thumb">' + thumb +
          (daysAgo(n) <= 21 ? '<span class="new-tag">NEW</span>' : '') + '</div>' +
        '<div class="promo-body">' +
          '<div class="promo-title">' + n.title + '</div>' +
          '<div class="promo-meta"><span>' + n.date + '</span><span class="dot"></span><span>조회 ' + (n.views || '0') + '</span></div>' +
        '</div></div>';
    }).join('');

    count.textContent = list.length;
    empty.style.display = list.length ? 'none' : 'block';

    function bindGo(el) {
      var go = function (e) {
        if (e && (e.target.closest('.attach') || e.target.closest('.lib-dl-btn') || e.target.closest('.promo-card-foot'))) return;
        location.href = 'notice-detail.html?id=' + el.dataset.id;
      };
      el.addEventListener('click', go);
      el.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); go(); } });
    }
    body.querySelectorAll('tr').forEach(function (tr) { tr.style.cursor = 'pointer'; tr.tabIndex = 0; tr.setAttribute('role', 'link'); bindGo(tr); });
    if (cards) cards.querySelectorAll('.promo-card').forEach(bindGo);
  }
  periodSel.addEventListener('change', render);
  search.addEventListener('input', render);
  searchBtn.addEventListener('click', render);
  reset.addEventListener('click', function () {
    periodSel.value = 'all'; search.value = ''; render();
  });
  render();
})();
</script>
<script>
/* 첨부파일 다운로드 팝업 (일반자료실과 동일 로직) */
(function(){
  var modal=document.getElementById('libDownloadModal'); if(!modal) return;
  var listEl=document.getElementById('libFileList');
  var allCb=document.getElementById('libDlAll');
  var countEl=document.getElementById('libDlCount');
  var docNameEl=document.getElementById('libDlDocName');
  var dlBtn=document.getElementById('libDlSelected');
  var lastFocus=null;
  function boxes(){ return listEl.querySelectorAll('input[type=checkbox]'); }
  function update(){
    var items=boxes(), checked=0; items.forEach(function(c){ if(c.checked) checked++; });
    countEl.textContent=checked+'개 선택'; dlBtn.disabled = checked===0;
    allCb.checked = checked>0 && checked===items.length;
    allCb.indeterminate = checked>0 && checked<items.length;
  }
  function openPopup(btn){
    lastFocus=btn;
    var files=[]; try{ files=JSON.parse(btn.getAttribute('data-files')||'[]'); }catch(e){}
    docNameEl.textContent=btn.getAttribute('data-doc')||'';
    listEl.innerHTML='';
    files.forEach(function(f,i){
      var id='libf_'+i;
      var li=document.createElement('li'); li.className='lib-file-item';
      var lab=document.createElement('label'); lab.setAttribute('for',id);
      lab.innerHTML='<input type="checkbox" id="'+id+'"><span class="lib-file-name"></span><span class="lib-file-size"></span>';
      lab.querySelector('.lib-file-name').textContent=f.name;
      lab.querySelector('.lib-file-size').textContent=f.size||'';
      lab.querySelector('input').value=f.name;
      li.appendChild(lab); listEl.appendChild(li);
    });
    boxes().forEach(function(c){ c.addEventListener('change', update); });
    allCb.checked=false; allCb.indeterminate=false; update();
    if(window.__openModal) window.__openModal('libDownloadModal');
    var first=listEl.querySelector('input[type=checkbox]')||modal.querySelector('.modal-close');
    if(first) setTimeout(function(){ first.focus(); }, 40);
  }
  document.addEventListener('click', function(e){
    var b=e.target.closest('.lib-dl-btn'); if(b){ e.preventDefault(); e.stopPropagation(); openPopup(b); }
  });
  allCb.addEventListener('change', function(){ boxes().forEach(function(c){ c.checked=allCb.checked; }); update(); });
  dlBtn.addEventListener('click', function(){
    var names=[]; boxes().forEach(function(c){ if(c.checked) names.push(c.value); });
    if(!names.length) return;
    var msg = names.length===1 ? ('"'+names[0]+'" 다운로드가 시작됩니다.') : (names.length+'개 파일 다운로드가 시작됩니다.');
    if(window.__toast) window.__toast(msg,'success');
    if(window.__closeModal) window.__closeModal(modal);
  });
  modal.addEventListener('transitionend', function(){
    if(modal.getAttribute('aria-hidden')==='true' && lastFocus){ var t=lastFocus; lastFocus=null; t.focus(); }
  });
})();
</script>
</body>
</html>
