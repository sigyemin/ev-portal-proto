  <circle cx="228" cy="138" r="14" fill="#334155"/>
  <circle cx="228" cy="138" r="5" fill="#94A3B8"/>
  <circle cx="110" cy="138" r="22" fill="#1E293B"/>
  <circle cx="110" cy="138" r="14" fill="#334155"/>
  <circle cx="110" cy="138" r="5" fill="#94A3B8"/>
