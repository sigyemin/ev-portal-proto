<script>
(function(){
  function show(id, on){ var e=document.getElementById(id); if(e) e.style.display = on ? '' : 'none'; }
  function update(){
    var r=document.querySelector('input[name=userGb]:checked'); var v=r?r.value:'';
    // 유역청·지자체·타부처: 소속구분 노출(드롭다운 옵션은 각각 상이) / 환경부·환경공단·협회·공공기관·민간사업자: 미노출
    show('row_basin', v==='basin');   // 유역청
    show('row_local', v==='local');   // 지자체(시·도)
    show('row_other', v==='other');   // 타부처
  }
  Array.prototype.forEach.call(document.querySelectorAll('input[name=userGb]'), function(r){ r.addEventListener('change', update); });
  update();
})();
</script>
