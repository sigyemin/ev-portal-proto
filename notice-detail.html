/* 순서 배열 — 이전/다음 글 계산에 사용 */
const NOTICE_ORDER = ['n001','n002','n003','n004','n005','n006','n007','n008','n009','n010'];

(function(){
  // URL 파라미터 ?id=n00X (없으면 n002)
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || 'n002';

  /* ===== 새소식 분기: N* (공지사항) / P* (보도자료) ===== */
  if (window.NEWS_ITEMS && window.NEWS_ITEMS[id]) {
    const item = window.NEWS_ITEMS[id];
    const isPress = item.cat === 'press';
    const isPromo = item.cat === 'promo';

    document.title = item.title + ' | 무공해차 통합누리집';
    document.getElementById('pageH1').textContent = isPromo ? '[홍보자료-상세]' : isPress ? '[보도자료-상세]' : '[공지사항-상세]';
    const bcParent = document.getElementById('bcParent');
    if (bcParent) {
      bcParent.textContent = isPromo ? '홍보자료' : isPress ? '보도자료' : '공지사항';
      bcParent.href = isPromo ? 'notice-promo.html' : isPress ? 'notice-press.html' : 'notice-list.html';
    }

    document.getElementById('ndTitle').textContent = item.title;
    document.getElementById('ndDept').textContent = item.dept || '-';
    document.getElementById('ndDate').textContent = item.date;
    document.getElementById('ndViews').textContent = item.views || '0';
    document.getElementById('ndAttachCount').textContent = (item.attach || 0) + '건';

    const docNo = (isPromo ? 'HM-' : isPress ? 'PR-' : 'NT-') + '2026-' + id.replace(/^[A-Za-z]+/, '').padStart(4, '0');
    const ndDocNoEl = document.getElementById('ndDocNo'); if (ndDocNoEl) ndDocNoEl.textContent = docNo;

    document.getElementById('ndArticle').innerHTML = item.body || ('<p>' + item.desc + '</p>');

    const backBtn = document.getElementById('ndBackBtn');
    if (backBtn) backBtn.href = isPromo ? 'notice-promo.html' : isPress ? 'notice-press.html' : 'notice-list.html';

    const sameCat = window.NewsHelper.getList(item.cat);
    const idx = sameCat.findIndex(x => x.id === id);
    const prevEl = document.getElementById('ndPrev');
    const nextEl = document.getElementById('ndNext');
    if (idx > 0 && prevEl) {
      const p = sameCat[idx - 1];
      prevEl.href = 'notice-detail.html?id=' + p.id;
      const t = prevEl.querySelector('.nd-sib-title'); if (t) t.textContent = p.title;
      const m = prevEl.querySelector('.nd-sib-meta'); if (m) m.textContent = p.date;
    }
    if (idx >= 0 && idx < sameCat.length - 1 && nextEl) {
      const n = sameCat[idx + 1];
      nextEl.href = 'notice-detail.html?id=' + n.id;
      const t = nextEl.querySelector('.nd-sib-title'); if (t) t.textContent = n.title;
      const m = nextEl.querySelector('.nd-sib-meta'); if (m) m.textContent = n.date;
    }

    return;
  }
  /* ===== 새소식 분기 끝 ===== */
  const notice = NOTICE_DB[id] || NOTICE_DB.n002;

  // 헤더 메타 반영
  // 페이지 H1 — 고정 포맷
  document.getElementById('pageH1').textContent = '[공지사항-상세]';
  document.title = `${notice.title} | 무공해차 통합누리집`;

  document.getElementById('ndTitle').textContent = notice.title;
  document.getElementById('ndDept').textContent = notice.dept;
  document.getElementById('ndDate').textContent = notice.date;
  document.getElementById('ndViews').textContent = notice.views;
  document.getElementById('ndAttachCount').textContent = (notice.attachments?.length || 0) + '건';

  // 문서번호(제목 아래 메타 영역)
  const ndDocNoVal = 'NT-2026-' + id.replace(/^n/, '').padStart(4, '0');
  const ndDocNoEl = document.getElementById('ndDocNo'); if (ndDocNoEl) ndDocNoEl.textContent = ndDocNoVal;

  // 본문 렌더
  const articleEl = document.getElementById('ndArticle');
  let bodyHTML = notice.body;

  // 첨부 파일 섹션 (다중 체크박스 선택 → 선택 다운로드)
  if (notice.attachments && notice.attachments.length > 0) {
    bodyHTML += `
      <div class="nd-attach-wrap">
        <div class="nd-attach-head">
          <h4>첨부 파일 <span class="nd-attach-count">${notice.attachments.length}</span></h4>
          <label class="nd-attach-selall"><input type="checkbox" id="ndAtAll"> 전체 선택</label>
        </div>
        <ul class="nd-attach-list">
          ${notice.attachments.map(f => `
            <li class="nd-attach-item">
              <label>
                <input type="checkbox" class="nd-at-cb" value="${f.name}">
                <span class="nd-attach-ico ${f.ext}">${f.ext.toUpperCase()}</span>
                <span class="nd-attach-name">${f.name}</span>
                <span class="nd-attach-size">${f.size}</span>
              </label>
            </li>
          `).join('')}
        </ul>
        <div class="nd-attach-foot">
          <span class="nd-at-count" id="ndAtSel">0개 선택</span>
          <button type="button" class="nd-attach-btn primary" id="ndAtDl" disabled>선택 다운로드</button>
        </div>
      </div>
    `;
  }
  articleEl.innerHTML = bodyHTML;

  // 첨부파일 다중 선택 다운로드 로직
  (function(){
    var all = document.getElementById('ndAtAll');
    var dlBtn = document.getElementById('ndAtDl');
    var selEl = document.getElementById('ndAtSel');
    if (!dlBtn) return;
    var boxes = function(){ return articleEl.querySelectorAll('.nd-at-cb'); };
    function update(){
      var items = boxes(), checked = 0;
      items.forEach(function(c){ if (c.checked) checked++; });
      if (selEl) selEl.textContent = checked + '개 선택';
      dlBtn.disabled = checked === 0;
      if (all){ all.checked = checked > 0 && checked === items.length; all.indeterminate = checked > 0 && checked < items.length; }
    }
    if (all) all.addEventListener('change', function(){ boxes().forEach(function(c){ c.checked = all.checked; }); update(); });
    boxes().forEach(function(c){ c.addEventListener('change', update); });
    dlBtn.addEventListener('click', function(){
      var names = []; boxes().forEach(function(c){ if (c.checked) names.push(c.value); });
      if (!names.length) return;
      var msg = names.length === 1 ? ('"' + names[0] + '" 다운로드가 시작됩니다.') : (names.length + '개 파일 다운로드가 시작됩니다.');
      if (window.__toast) window.__toast(msg, 'success');
    });
    update();
  })();

  // 이전/다음 글
  const idx = NOTICE_ORDER.indexOf(id);
  const prevEl = document.getElementById('ndPrev');
  const nextEl = document.getElementById('ndNext');
  function bindSibling(el, siblingId) {
    if (!siblingId || !NOTICE_DB[siblingId]) {
      el.classList.add('disabled');
      el.querySelector('.nd-sib-title').textContent = '이전 글이 없습니다.';
      el.querySelector('.nd-sib-meta').textContent = '—';
      return;
    }
    const s = NOTICE_DB[siblingId];
    el.href = `notice-detail.html?id=${siblingId}`;
    el.querySelector('.nd-sib-title').textContent = s.title;
    el.querySelector('.nd-sib-meta').textContent = s.date;
  }
  bindSibling(prevEl, NOTICE_ORDER[idx - 1]);
  bindSibling(nextEl, NOTICE_ORDER[idx + 1]);
  if (idx === 0 || !NOTICE_ORDER[idx - 1]) {
    prevEl.classList.add('disabled');
    prevEl.querySelector('.nd-sib-title').textContent = '이전 글이 없습니다.';
    prevEl.querySelector('.nd-sib-meta').textContent = '—';
  }
  if (idx === NOTICE_ORDER.length - 1 || !NOTICE_ORDER[idx + 1]) {
    nextEl.classList.add('disabled');
    nextEl.querySelector('.nd-sib-title').textContent = '다음 글이 없습니다.';
    nextEl.querySelector('.nd-sib-meta').textContent = '—';
  }

  // 관련 공지 (같은 카테고리에서 현재 글 제외하고 최대 3개)
  const related = NOTICE_ORDER
    .filter(nid => nid !== id && NOTICE_DB[nid].cat === notice.cat)
    .slice(0, 3);
  const fallback = related.length < 3
    ? NOTICE_ORDER.filter(nid => nid !== id && !related.includes(nid)).slice(0, 3 - related.length)
    : [];
  const relIds = [...related, ...fallback].slice(0, 3);
  const relGrid = document.getElementById('ndRelGrid');
  if (relGrid) relGrid.innerHTML = relIds.map(nid => {
    const n = NOTICE_DB[nid];
    return `
      <a href="notice-detail.html?id=${nid}" class="nd-rel-card">
        <span class="cat-chip ${n.catClass}">${n.catLabel}</span>
        <h5>${n.title}</h5>
        <div class="nd-rel-meta">
          <span>${n.date}</span>
          <span class="views">조회 ${n.views}</span>
        </div>
      </a>
    `;
  }).join('');

})();
</script>
