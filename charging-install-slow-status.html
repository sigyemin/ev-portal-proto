<script>

   [DEV] 담당자 입력값 = 답변메모 · 지자체메모(현행분석 근거). 전부 더미. 5단계 허구 타임라인·문의처 제거. */
(function(){
  // 실단계 스텝 마스터 (state는 앱별로 지정)

    var m=[['100','신청접수(대기)'],['200','승인 · 사업수행기관 배정']];
    return { group:'직접신청 · 배정', steps:m.map(function(s,i){ return { code:s[0], label:s[1], state:(states[i]||'') }; }) };
  }
  function grpInstall(states){ // [설치·지급]
    var m=[['130','접수승인'],['140','착공'],['150','공사완료'],['217','현장점검완료'],['221','지급확인'],['501','완료']];

  }
  // ── charging-install-slow-apply 섹션 1:1 미러 ──
  function applicantSec(o){ var r=[['신청자명',o.name],['전화번호(유선)',o.tel||'—'],['휴대폰',o.phone],['신청부지와의 관계',o.rel],['기관명(설치지점명)',o.site]]; if(o.bizNo) r.push(['사업자번호',o.bizNo]); return { title:'신청자 정보', rows:r }; }
  function siteSec(o){ return { title:'설치장소', rows:[['설치희망지 구분',o.type],['총 주차면수',o.park],['설치희망지(주소)',o.addr]] }; }
  function chargerSec(o){ return { title:'충전기 현황', rows:[['기설치 충전기 수량',o.exist],['설치예정 충전기 수량',o.plan]] }; }
  function qtySec(rows){ return { title:'설치희망 수량', rows:rows }; }
  function prefSec(o){ return { title:'사업수행기관 선호순위', rows:[['1순위',o.p1],['2순위',o.p2||'—'],['3순위',o.p3||'—']] }; }
  function agreeSec(v){ return { title:'설치동의', rows:[['설치동의 여부',v||'동의함']] }; }
  function assignSec(v){ return { title:'배정 결과', rows:[['배정 사업수행기관',v]] }; }
  function noteSec(t){ return { title:'특이사항', memo:t||'—' }; }

          prefSec({ p1:'GS차지비', p2:'SK일렉링크', p3:'대영채비' }),
          agreeSec('동의함'),
          noteSec('지하 주차장 B2 구역에 설치 예정입니다.')

        stages:[ grpApply(['current','']), grpInstall(['','','','','','']) ],
        docs: slowDocs({}) },

      // ② 시공 단계 — 현장 보완요청(215) · 조치 필요
      { appId:'CIS-2026-002388', project:'공용 완속충전시설 직접신청', applyDate:'2026.03.19', status:'현장 보완요청 (215)',
        notice:{ name:'2026년 공용 완속충전시설 직접설치 지원 안내', no:'환경부공고 제2026-088호', org:'한국환경공단', period:'상시 접수', announce:'접수 후 30일 이내 검토', scale:'설치비 지원(기당 상한)' },
        applicant:applicantSec({ name:'이관리', tel:'031-222-3333', phone:'010-3333-4444', rel:'시설 관리자 (공동주택 관리사무소 등)', site:'새롬빌라' }),
        sections:[
          siteSec({ type:'주거시설 2 (공동주택 외: 단독·다가구 등)', park:'30 면', addr:'경기도 성남시 분당구 판교로 000' }),
          chargerSec({ exist:'급속 0기 · 완속 0기', plan:'급속 0기 · 완속 3기' }),
          qtySec([['3kW이상~7kW미만','3기']]),

          assignSec('대영채비(주)'),
          noteSec('—')
        ],
        stages:[ grpApply(['done','done']), grpInstall(['done','done','done','current','','']) ],

        supplement:{ reason:'[지자체메모] 현장 점검 결과 설치동의서(회의록)의 동의 범위·서명이 확인되지 않습니다. 해당 서류를 보완하여 재제출해 주세요. (보완확인 시 216으로 진행)' } },

      // ③ 완료(501)
      { appId:'CIS-2026-002210', project:'공용 완속충전시설 직접신청', applyDate:'2026.02.20', status:'완료 (501)',
        notice:{ name:'2026년 공용 완속충전시설 직접설치 지원 안내', no:'환경부공고 제2026-088호', org:'한국환경공단', period:'상시 접수', announce:'접수 후 30일 이내 검토', scale:'설치비 지원(기당 상한)' },
        applicant:applicantSec({ name:'박완료', tel:'032-555-6666', phone:'010-5555-6666', rel:'건물(부지)소유자 (입주자대표회의·관리단 포함)', site:'푸른마을아파트' }),
        sections:[
          siteSec({ type:'주거시설 1 (공동주택: 아파트·연립·다세대·기숙사 등)', park:'200 면', addr:'인천광역시 연수구 컨벤시아대로 000' }),
          chargerSec({ exist:'급속 0기 · 완속 4기', plan:'급속 0기 · 완속 6기' }),
          qtySec([['7kW이상~11kW미만','6기']]),
          prefSec({ p1:'GS차지비', p2:'SK일렉링크', p3:'대영채비' }),
          assignSec('GS차지비(주)'),
          noteSec('—')
        ],
