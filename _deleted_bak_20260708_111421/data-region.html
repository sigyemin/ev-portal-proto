<script>
/* ── 지역별 보급 현황 표준 리스트 (검색·정렬·페이지네이션·엑셀) · 데이터 더미 ── */
(function(){
  // 시도 → 시군구 (전국 기초자치단체)
  const SS = {
    '서울특별시':['종로구','중구','용산구','성동구','광진구','동대문구','중랑구','성북구','강북구','도봉구','노원구','은평구','서대문구','마포구','양천구','강서구','구로구','금천구','영등포구','동작구','관악구','서초구','강남구','송파구','강동구'],
    '부산광역시':['중구','서구','동구','영도구','부산진구','동래구','남구','북구','해운대구','사하구','금정구','강서구','연제구','수영구','사상구','기장군'],
    '대구광역시':['중구','동구','서구','남구','북구','수성구','달서구','달성군','군위군'],
    '인천광역시':['중구','동구','미추홀구','연수구','남동구','부평구','계양구','서구','강화군','옹진군'],
    '광주광역시':['동구','서구','남구','북구','광산구'],
    '대전광역시':['동구','중구','서구','유성구','대덕구'],
    '울산광역시':['중구','남구','동구','북구','울주군'],
    '세종특별자치시':['세종시'],
    '경기도':['수원시','성남시','의정부시','안양시','부천시','광명시','평택시','동두천시','안산시','고양시','과천시','구리시','남양주시','오산시','시흥시','군포시','의왕시','하남시','용인시','파주시','이천시','안성시','김포시','화성시','광주시','양주시','포천시','여주시','연천군','가평군','양평군'],
    '강원특별자치도':['춘천시','원주시','강릉시','동해시','태백시','속초시','삼척시','홍천군','횡성군','영월군','평창군','정선군','철원군','화천군','양구군','인제군','고성군','양양군'],
    '충청북도':['청주시','충주시','제천시','보은군','옥천군','영동군','증평군','진천군','괴산군','음성군','단양군'],
    '충청남도':['천안시','공주시','보령시','아산시','서산시','논산시','계룡시','당진시','금산군','부여군','서천군','청양군','홍성군','예산군','태안군'],
    '전북특별자치도':['전주시','군산시','익산시','정읍시','남원시','김제시','완주군','진안군','무주군','장수군','임실군','순창군','고창군','부안군'],
    '전라남도':['목포시','여수시','순천시','나주시','광양시','담양군','곡성군','구례군','고흥군','보성군','화순군','장흥군','강진군','해남군','영암군','무안군','함평군','영광군','장성군','완도군','진도군','신안군'],
    '경상북도':['포항시','경주시','김천시','안동시','구미시','영주시','영천시','상주시','문경시','경산시','의성군','청송군','영양군','영덕군','청도군','고령군','성주군','칠곡군','예천군','봉화군','울진군','울릉군'],
    '경상남도':['창원시','진주시','통영시','사천시','김해시','밀양시','거제시','양산시','의령군','함안군','창녕군','고성군','남해군','하동군','산청군','함양군','거창군','합천군'],
    '제주특별자치도':['제주시','서귀포시']
  };
  const VT = [
    { key:'all',   label:'전체',     share:1     },
    { key:'ev',    label:'전기승용', share:0.68  },
    { key:'truck', label:'전기화물', share:0.16  },
    { key:'bus',   label:'전기승합', share:0.02  },
    { key:'moto',  label:'전기이륜', share:0.08  },
    { key:'h2',    label:'수소차',   share:0.04  },
    { key:'cons',  label:'건설기계', share:0.02  }
  ];
  const VT_LABEL = {}; VT.forEach(v => VT_LABEL[v.key] = v.label);

  // ── 더미 데이터 생성 (결정론적) ──
  const ROWS = [];
  let idx = 0;
  Object.keys(SS).forEach(sido => {
    SS[sido].forEach(sgg => {
      idx++;
      const pop = 30 + ((idx*37 + 13) % 470);       // 인구(천명) 30~499
      const pen = 20 + ((idx*17 + 7) % 110);         // 무공해차/천명(전체) 20~129
      const total = Math.round(pop * pen);
      const reg = {
        all:   total,
        ev:    Math.round(total*0.68),
        truck: Math.round(total*0.16),
        bus:   Math.round(total*0.02),
        moto:  Math.round(total*0.08),
        h2:    Math.round(total*0.04),
        cons:  Math.round(total*0.02)
      };
      const monthlyRate = 0.008 + ((idx*11) % 20)/2000;  // 0.8~1.75%
      ROWS.push({ sido, sgg, pop, reg, monthlyRate });
    });
  });
  // 차종별 전국 평균 인구천명당
  const AVGPP = {};
  VT.forEach(v => { const a = ROWS.map(r => r.reg[v.key]/r.pop); AVGPP[v.key] = a.reduce((x,y)=>x+y,0)/a.length; });

  const ppOf      = (r,vt) => r.reg[vt] / r.pop;
  const vsAvgOf   = (r,vt) => ppOf(r,vt) / AVGPP[vt] - 1;
  const monthlyOf = (r,vt) => Math.round(r.reg[vt] * r.monthlyRate);
  const fmt = n => n.toLocaleString('ko-KR');

  // ── 상태 ──
  const st = { vt:'all', sido:'', search:'', sortKey:'', sortDir:0, page:1 };
  const PAGE = 20;

  const $ = id => document.getElementById(id);
  // 시도 필터 옵션
  $('rgSido').innerHTML = '<option value="">전체</option>' + Object.keys(SS).map(s => `<option value="${s}">${s}</option>`).join('');

  function filtered() {
    return ROWS.filter(r => (!st.sido || r.sido === st.sido)
      && (!st.search || (r.sido + r.sgg).indexOf(st.search) >= 0));
  }
  function valOf(r, key) {
    switch (key) {
      case 'sido': return r.sido;
      case 'sgg':  return r.sgg;
      case 'reg':  return r.reg[st.vt];
      case 'pp':   return ppOf(r, st.vt);
      case 'vs':   return vsAvgOf(r, st.vt);
      case 'monthly': return monthlyOf(r, st.vt);
    }
  }
  function sorted(arr) {
    if (!st.sortKey) return arr;
    const numeric = ['reg','pp','vs','monthly'].indexOf(st.sortKey) >= 0;
    return arr.slice().sort((a,b) => {
      const av = valOf(a, st.sortKey), bv = valOf(b, st.sortKey);
      const c = numeric ? (av - bv) : String(av).localeCompare(String(bv), 'ko');
      return st.sortDir === 1 ? -c : c;   // 1 내림차순 · 2 올림차순
    });
  }

  function renderPagination(totalPages) {
    const pag = $('rgPagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    const cur = st.page, win = 10;
    const block = Math.floor((cur-1)/win), start = block*win+1, end = Math.min(start+win-1, totalPages);
    let h = '';
    h += `<button ${cur<=1?'disabled':''} data-p="first" aria-label="처음 페이지">«</button>`;
    h += `<button ${cur<=1?'disabled':''} data-p="prev" aria-label="이전 페이지">‹</button>`;
    for (let i=start; i<=end; i++) h += `<button class="${i===cur?'active':''}" data-p="${i}"${i===cur?' aria-current="page"':''}>${i}</button>`;
    h += `<button ${cur>=totalPages?'disabled':''} data-p="next" aria-label="다음 페이지">›</button>`;
    h += `<button ${cur>=totalPages?'disabled':''} data-p="last" aria-label="마지막 페이지">»</button>`;
    pag.innerHTML = h;
    pag.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
      const p = b.dataset.p;
      if (p==='first') st.page=1; else if (p==='last') st.page=totalPages;
      else if (p==='prev') st.page=Math.max(1,cur-1); else if (p==='next') st.page=Math.min(totalPages,cur+1);
      else st.page=parseInt(p,10);
      render();
      try { $('rgTable').scrollIntoView({behavior:'smooth',block:'start'}); } catch(e){}
    }));
  }

  function render() {
    const all = sorted(filtered());
    const totalPages = Math.max(1, Math.ceil(all.length / PAGE));
    if (st.page > totalPages) st.page = totalPages;
    const rows = all.slice((st.page-1)*PAGE, st.page*PAGE);
    const vt = st.vt;

    $('rgThReg').firstChild.textContent = (vt === 'all' ? '등록수' : VT_LABEL[vt] + ' 등록수');
    $('rgVtCap').textContent = `차종: ${VT_LABEL[vt]} · 인구 천명당·전국 평균 대비·월 신규는 선택 차종 기준입니다.`;
    $('rgCount').innerHTML = `전체 <b>${ROWS.length}</b>개 시군구 중 <b>${all.length}</b>개 표시`;

    const tb = $('rgRows');
    if (!rows.length) {
      tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:28px;color:#6B7280;">조회 결과가 없습니다.</td></tr>';
    } else {
      tb.innerHTML = rows.map(r => {
        const vs = vsAvgOf(r, vt), vsPct = Math.round(vs*100);
        return `<tr>
          <td>${r.sido}</td>
          <td style="font-weight:700;">${r.sgg}</td>
          <td class="num">${fmt(r.reg[vt])}대</td>
          <td class="num">${ppOf(r,vt).toFixed(1)}대</td>
          <td class="num"><span class="rg-vs ${vsPct>=0?'up':'down'}">${vsPct>=0?'+':''}${vsPct}%</span></td>
          <td class="num">${fmt(monthlyOf(r,vt))}대</td>
        </tr>`;
      }).join('');
    }
    // 헤더 정렬 표시
    $('rgTable').querySelectorAll('th.sortable').forEach(th => {
      const k = th.dataset.sk;
      th.classList.toggle('sort-desc', st.sortKey===k && st.sortDir===1);
      th.classList.toggle('sort-asc',  st.sortKey===k && st.sortDir===2);
    });
    renderPagination(totalPages);
  }

  // ── 이벤트 ──
  $('rgVt').addEventListener('change', function(){ st.vt=this.value; st.page=1; render(); });
  $('rgSido').addEventListener('change', function(){ st.sido=this.value; st.page=1; render(); });
  $('rgSearch').addEventListener('input', function(){ st.search=this.value.trim(); st.page=1; render(); });
  // 기준 드롭다운 → 해당 열 내림차순 정렬
  $('rgBasis').addEventListener('change', function(){ st.sortKey=this.value; st.sortDir=1; st.page=1; render(); });
  // 열 머리글 클릭 정렬 (기본→내림→올림 순환)
  $('rgTable').querySelectorAll('th.sortable').forEach(th => th.addEventListener('click', function(){
    const k = th.dataset.sk;
    if (st.sortKey === k) { st.sortDir = (st.sortDir+1)%3; if (st.sortDir===0) st.sortKey=''; }
    else { st.sortKey = k; st.sortDir = 1; }
    st.page = 1; render();
  }));

  // ── 엑셀 다운로드 (SheetJS) ──
  $('rgExcel').addEventListener('click', function(){
    if (typeof XLSX === 'undefined') { if (window.__toast) window.__toast('엑셀 라이브러리를 불러오지 못했습니다.','warning'); return; }
    const rows = sorted(filtered());
    const cond = [ st.sido ? ('시도: '+st.sido) : '시도: 전체', '차종: '+VT_LABEL[st.vt], st.search ? ('검색: '+st.search) : '검색: -' ].join(' · ');
    const info = [
      ['항목','내용'],
      ['자료명','지역별 무공해차 보급 현황'],
      ['출처','KOSIS 국가통계포털 (월 1회 갱신 · 시연용 더미 데이터)'],
      ['다운로드 시각', new Date().toLocaleString('ko-KR')],
      ['조회 조건', cond],
      ['조회 건수', rows.length + '개 시군구'],
      ['단위','등록수=대 · 인구 천명당=대/천명 · 월 신규=대'],
      ['비고','인구 천명당·월 신규는 각 차종별 등록수를 기준으로 산출']
    ];
    const head = ['시도','시군구','인구(천명)','전체 등록','전기승용','전기화물','전기승합','전기이륜','수소차','건설기계','인구 천명당(전체)','월 신규(전체)'];
    const body = rows.map(r => [ r.sido, r.sgg, r.pop, r.reg.all, r.reg.ev, r.reg.truck, r.reg.bus, r.reg.moto, r.reg.h2, r.reg.cons, +ppOf(r,'all').toFixed(1), monthlyOf(r,'all') ]);
    const wb = XLSX.utils.book_new();
    const ws0 = XLSX.utils.aoa_to_sheet(info); ws0['!cols'] = [{wch:14},{wch:64}];
    const ws1 = XLSX.utils.aoa_to_sheet([head, ...body]);
    ws1['!cols'] = [{wch:14},{wch:14},{wch:11},{wch:11},{wch:10},{wch:10},{wch:10},{wch:10},{wch:9},{wch:10},{wch:16},{wch:13}];
    XLSX.utils.book_append_sheet(wb, ws0, '안내');
    XLSX.utils.book_append_sheet(wb, ws1, '지역별_보급현황');
    const fn = `지역별_보급현황_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, fn);
    if (window.__toast) window.__toast(`엑셀 파일 "${fn}" 다운로드를 시작합니다. (2개 시트)`,'success');
  });

  render();
})();
</script>
