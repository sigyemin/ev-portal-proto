<style>
.ctip{position:relative;display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;margin-left:5px;border-radius:50%;background:#94a3b8;color:#fff;font-size:10px;line-height:1;cursor:help;vertical-align:middle;font-style:normal}
.ctip:hover::after{content:attr(data-tip);position:absolute;left:50%;bottom:150%;transform:translateX(-50%);white-space:normal;width:250px;background:#1f2937;color:#fff;font-size:11.5px;font-weight:400;line-height:1.6;padding:9px 11px;border-radius:8px;z-index:50;box-shadow:0 6px 18px rgba(0,0,0,.2);text-align:left}
/* 해당 로우 라벨(지방비·자동차세) 밑에 들어가는 조건 드롭다운 */
.cmp-row-ctrl{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
.cmp-row-ctrl select{flex:0 1 auto;min-width:90px;max-width:140px;height:34px;padding:0 10px;border:1px solid var(--border-medium);border-radius:8px;font-size:12.5px;font-family:inherit;font-weight:600;color:var(--text-primary);background:#fff;cursor:pointer;}
.cmp-row-ctrl select:focus{outline:2px solid var(--color-primary-400,#5cc295);outline-offset:1px;}
.ctip:hover::before{content:"";position:absolute;left:50%;bottom:150%;transform:translateX(-50%) translateY(100%);border:5px solid transparent;border-top-color:#1f2937;z-index:50}
/* 추가 모달 radio-card: 라디오 선택 표시 */
[data-modal-car-select] .radio-card{display:flex;align-items:center;cursor:pointer;}
[data-modal-car-select] .radio-card:has(input:checked){border-color:var(--color-primary-500,#22c55e);box-shadow:0 0 0 2px var(--color-primary-100,#dcfce7);}
/* 모달 내부 스크롤 보정(목록이 길어도 body가 스크롤되도록) */
#addCarModal .modal-body{flex:1 1 auto;min-height:0;}
/* 추가 모달 페이지네이션 */
#cmpModalPager{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:14px;flex-wrap:wrap;}
#cmpModalPager button{min-width:34px;height:34px;padding:0 10px;border:1px solid var(--border-light);border-radius:8px;background:#fff;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;}
#cmpModalPager button.active{background:var(--color-primary-500,#22c55e);border-color:var(--color-primary-500,#22c55e);color:#fff;}
#cmpModalPager button:disabled{opacity:.4;cursor:default;}
</style>

  // ── 비교표 공통 빌더 (항목 + 3열 고정) ──
  function headerRow(first){
    var out='<div class="comparison-row header"><div>'+first+'</div>';
    for(var i=0;i<3;i++) out+='<div>'+(state[i]?esc(CARS[state[i]].name):'추가 차량')+'</div>';
    return out+'</div>';
  }
  function cells(fn, cellStyle){
    var out='', white=cellStyle&&/color:#fff/.test(cellStyle);
    for(var i=0;i<3;i++){ var k=state[i];
      if(k) out+='<div'+(cellStyle?' style="'+cellStyle+'"':'')+'>'+fn(CARS[k])+'</div>';
      else out+='<div style="color:'+(white?'rgba(255,255,255,.6)':'var(--text-tertiary)')+';">-</div>';
    }
    return out;
  }
  function row(label, fn, opt){ opt=opt||{};
    var labStyle=opt.labelStyle||'color:var(--text-secondary);';
    var lab='<div style="'+labStyle+'">'+label+(opt.tip?tip(opt.tip):'')+(opt.ctrl||'')+'</div>';
    return '<div class="comparison-row"'+(opt.rowStyle?' style="'+opt.rowStyle+'"':'')+'>'+lab+cells(fn,opt.cellStyle)+'</div>';
  }

    h+=row('1회 충전 주행 (저온)', function(c){return esc(c[c.energy].주행저온);});
    h+=row('충전 · 연료 시간', function(c){return c.energy==='ev'?esc(c.ev.완속):esc(c.fcev.충전시간);}, {tip:'전기차는 완속 완충(0→100%), 수소차는 1회 충전 시간 기준입니다.'});
    // 전기 전용(수소차 셀=해당없음)
    if(anyEv){
      h+=row('배터리 용량', function(c){return c.energy==='ev'?esc(c.ev.배터리용량):na();});
      h+=row('배터리 종류', function(c){return c.energy==='ev'?esc(c.ev.배터리종류):na();});
      h+=row('급속 (10→80%)', function(c){return c.energy==='ev'?esc(c.ev.급속):na();}, {tip:'고출력 급속충전기로 10%→80% 충전에 걸리는 대략적 시간(더미).'});
      h+=row('급속 최대 충전출력', function(c){return c.energy==='ev'?esc(c.ev.급속출력):na();});
    }
    // 수소 전용(전기차 셀=해당없음)
    if(anyF){
      h+=row('수소탱크 용량', function(c){return c.energy==='fcev'?esc(c.fcev.수소탱크):na();});
      h+=row('충전 압력', function(c){return c.energy==='fcev'?esc(c.fcev.충전압력):na();});
      h+=row('연비 (km/kg)', function(c){return c.energy==='fcev'?esc(c.fcev.연비):na();});
    }
    $('cmpCharging').innerHTML=h+'</div>';
  }
  function renderSubsidy(){
    var lamt=curLamt();
    var ctrl='<div class="cmp-row-ctrl"><select id="cmpSido" aria-label="거주지 시·도"></select><select id="cmpSigungu" aria-label="거주지 시·군·구"></select></div>';
    var h='<div class="comparison-table">'+headerRow('항목');
    h+=row('국비 보조금', function(c){return won(c.subsidy.국비)+'만원';});
    h+=row('지방비', function(){return won(lamt)+'만원';}, {ctrl:ctrl});
    h+=row('총 보조금 <span style="font-size:11.5px;color:var(--text-tertiary);">(국비+지방비)</span>', function(c){return won(c.subsidy.국비+lamt)+'만원';}, {rowStyle:'background:var(--color-primary-50);', cellStyle:'font-weight:700;color:var(--color-primary-700);'});
    h+=row('세제 감면 (최대)', function(c){return won(c.subsidy.세제감면)+'만원';}, {tip:'개별소비세·교육세·취득세 등 법정 한도까지 적용한 최대 감면액(더미).'});
    h+=row('실 구매 가격', function(c){return won(c.subsidy.출고가-(c.subsidy.국비+lamt))+'만원';}, {rowStyle:'background:var(--gradient-primary);color:#fff;', labelStyle:'font-weight:700;color:#fff;', cellStyle:'font-weight:700;font-size:18px;'});
    $('cmpSubsidy').innerHTML=h+'</div>';
    fillRegion();
  }
  function renderRunning(){
    var tax=parseFloat(selUse)||0;
    var ctrl='<div class="cmp-row-ctrl"><select id="cmpUse" aria-label="자동차세 용도"></select></div>';
    var h='<div class="comparison-table">'+headerRow('연간 기준');
    h+=row('에너지 비용 (2만km)', function(c){return esc(c.running.에너지비용);}, {tip:'1년 2만km 가정 · 전기차는 충전료, 수소차는 수소료 단가 기준(더미).'});
    h+=row('자동차세', function(){return won(tax)+'만원';}, {tip:'차량 용도·종류별 자동차세(지방교육세 포함). 아래에서 용도 선택.', ctrl:ctrl});
    h+='<div class="comparison-row" style="background:var(--color-gray-50);"><div style="font-weight:700;grid-column:1 / -1;">이용 혜택 <span style="font-size:11.5px;font-weight:400;color:var(--text-tertiary);">(무공해차 공통)</span></div></div>';
    h+=row('고속도로 통행료', function(){return '<span class="chip chip-success">감면</span>';});
    h+=row('혼잡통행료 (서울)', function(){return '<span class="chip chip-success">면제</span>';});
    h+=row('공영주차장', function(){return '<span class="chip chip-success">감면</span>';});
    h+=row('환경개선부담금', function(){return '<span class="chip chip-success">면제</span>';});
    $('cmpRunning').innerHTML=h+'</div>';
    fillUse();
  }
  function fillRegion(){
    var sido=$('cmpSido'), sgg=$('cmpSigungu'); if(!sido||!sgg) return;
    sido.innerHTML=Object.keys(REGION).map(function(s){return '<option'+(s===selSido?' selected':'')+'>'+s+'</option>';}).join('');
    sgg.innerHTML=(REGION[selSido]||[]).map(function(g){return '<option value="'+g[1]+'"'+(String(g[1])===String(selSgg)?' selected':'')+'>'+g[0]+'</option>';}).join('');
  }
  function fillUse(){
    var u=$('cmpUse'); if(!u) return;
    u.innerHTML=TAX.map(function(t){return '<option value="'+t[1]+'"'+(String(t[1])===String(selUse)?' selected':'')+'>'+t[0]+'</option>';}).join('');
  }

  // ── 추가 모달 리스트 ──
  function carCat(c){ return /^수소/.test(c.chip) ? '수소차' : c.chip; }
  function renderModalList(){
    var host=$('cmpModalList'); if(!host) return;
    var avail=Object.keys(CARS).filter(function(k){return state.indexOf(k)<0;});
    host.innerHTML=avail.map(function(k){ var c=CARS[k];
      return '<label class="radio-card" data-car="'+k+'" data-cat="'+esc(carCat(c))+'">'
        +'<input type="radio" name="addPick" value="'+k+'" style="margin-right:10px;">'
        +'<div class="flex justify-between" style="flex:1;"><div><strong>'+esc(c.name)+'</strong><br><span style="font-size:13px;color:var(--text-tertiary);">'+esc(c.maker)+' · '+esc(c.chip)+'</span></div>'
        +'<div style="text-align:right;"><span class="chip '+c.chipClass+'">국비 '+won(c.subsidy.국비)+'만원</span></div></div></label>';
    }).join('');
    modalPage=1;
    applyModalFilter();
  }
  function renderModalPager(pages){
    var pg=$('cmpModalPager'); if(!pg) return;
    if(pages<=1){ pg.innerHTML=''; return; }
    var h='<button type="button" data-pg="prev"'+(modalPage<=1?' disabled':'')+' aria-label="이전">‹</button>';
    for(var i=1;i<=pages;i++){ h+='<button type="button" data-pg="'+i+'"'+(i===modalPage?' class="active"':'')+'>'+i+'</button>'; }
    h+='<button type="button" data-pg="next"'+(modalPage>=pages?' disabled':'')+' aria-label="다음">›</button>';
    pg.innerHTML=h;
  }
  function applyModalFilter(){
    var cards=[].slice.call(document.querySelectorAll('#cmpModalList .radio-card'));
    var matched=cards.filter(function(el){
      var okTab = el.dataset.cat===modalTab;
      var okQ = !modalQuery || el.textContent.toLowerCase().indexOf(modalQuery)>=0;
      return okTab && okQ;
    });
    var pages=Math.max(1, Math.ceil(matched.length/MODAL_PAGE_SIZE));
    if(modalPage>pages) modalPage=pages;
    var start=(modalPage-1)*MODAL_PAGE_SIZE, end=start+MODAL_PAGE_SIZE;
    cards.forEach(function(el){ el.style.display='none'; });
    matched.forEach(function(el,i){ el.style.display=(i>=start&&i<end)?'':'none'; });
    var empty=$('cmpModalEmpty'); if(empty) empty.style.display=matched.length?'none':'';
    renderModalPager(pages);
  }
  function closeAddModal(){
    var m=$('addCarModal'); if(!m) return;
    m.classList.remove('show'); m.setAttribute('aria-hidden','true');
    document.querySelectorAll('.modal-backdrop.show').forEach(function(b){b.classList.remove('show');});
    document.body.style.overflow='';   // main.js openModal이 건 스크롤 잠금 해제
  }

  // ── 전체 렌더 ──
  function renderCards(){ var h=''; for(var i=0;i<3;i++) h+=cardHTML(state[i], i); $('cmpCards').innerHTML=h; }
  function renderTitle(){ $('cmpSelTitle').textContent='선택한 차량 ('+state.length+'/3)'; }
  function renderAll(){ renderTitle(); renderCards(); renderBasic(); renderCharging(); renderSubsidy(); renderRunning(); renderModalList(); }

  // ── 이벤트(위임 · main.js 정적 바인딩과 충돌 없이 동적 요소 처리) ──
  document.addEventListener('change', function(e){
    var t=e.target;
    if(t.id==='cmpSido'){ selSido=t.value; selSgg=String((REGION[selSido][0]||[])[1]||0); renderSubsidy(); renderCards(); }
    else if(t.id==='cmpSigungu'){ selSgg=t.value; renderSubsidy(); renderCards(); }
    else if(t.id==='cmpUse'){ selUse=t.value; renderRunning(); }
  });
  document.addEventListener('click', function(e){
    var rm=e.target.closest('[data-role="remove-car"]');
    if(rm){ e.preventDefault(); state.splice(+rm.dataset.idx,1); renderAll(); toast('비교 목록에서 제거되었습니다.','info'); return; }
    if(e.target.closest('[data-modal-open="addCarModal"]')){ renderModalList(); return; }
    var mt=e.target.closest('#addCarModal .tab[data-tab]');
    if(mt){ modalTab=mt.dataset.tab; modalPage=1; applyModalFilter(); return; }
    var pgBtn=e.target.closest('#cmpModalPager button[data-pg]');
    if(pgBtn){ var v=pgBtn.dataset.pg;
      if(v==='prev') modalPage=Math.max(1, modalPage-1);
      else if(v==='next') modalPage=modalPage+1;
      else modalPage=parseInt(v,10);
      applyModalFilter(); return; }
  });
  var searchEl=$('cmpSearch');
  if(searchEl) searchEl.addEventListener('input', function(){ modalQuery=this.value.trim().toLowerCase(); modalPage=1; applyModalFilter(); });
  var applyEl=$('cmpApply');
  if(applyEl) applyEl.addEventListener('click', function(){
    var picked=document.querySelector('#cmpModalList input[name=addPick]:checked');
    if(!picked){ toast('추가할 차량을 선택해 주세요.','warning'); return; }
    if(state.length>=3){ toast('최대 3대까지 비교할 수 있습니다.','warning'); return; }
    state.push(picked.value); closeAddModal(); renderAll(); toast('비교 목록에 추가되었습니다.','success');
  });
  var resetEl=$('cmpReset');
  if(resetEl) resetEl.addEventListener('click', function(){ state=DEFAULT.slice(); renderAll(); toast('기본 2대로 초기화했습니다.','info'); });

  renderAll();
})();
</script>
</body>
</html>
