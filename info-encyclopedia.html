<script>
/* 백과 허브 — 탭 지연 로드 + iframe 자동 높이 */
(function () {
  function loadFrame(name) {
    var c = document.querySelector('[data-tab-content="' + name + '"]');
    if (!c) return;
    var f = c.querySelector('iframe.enc-frame');
    if (f && !f.getAttribute('src') && f.dataset.src) f.setAttribute('src', f.dataset.src);
  }
  // 현재 활성 탭(헤더 딥링크 ?tab= 반영 이후) 프레임을 최초 로드
  var active = document.querySelector('#encTabs .tab.active');
  loadFrame(active ? active.getAttribute('data-tab') : 'beginner');
  // 탭 전환 시 해당 탭 프레임 지연 로드
  document.querySelectorAll('#encTabs .tab').forEach(function (t) {
    t.addEventListener('click', function () { loadFrame(t.getAttribute('data-tab')); });
  });
  // 자식(iframe, embed) 높이 수신 → 자동 리사이즈
  window.addEventListener('message', function (e) {
    if (!e.data || typeof e.data.encHeight !== 'number') return;
    document.querySelectorAll('iframe.enc-frame').forEach(function (f) {
      if (f.contentWindow === e.source) f.style.height = (e.data.encHeight + 2) + 'px';
    });
  });
  // 자식 페이지 목차(앵커) 클릭 수신 → 부모 창을 해당 섹션으로 스크롤
  window.addEventListener('message', function (e) {
    if (!e.data || typeof e.data.encScrollTo !== 'number') return;
    var frames = document.querySelectorAll('iframe.enc-frame');
    for (var i = 0; i < frames.length; i++) {
      if (frames[i].contentWindow === e.source) {
        var base = frames[i].getBoundingClientRect().top + (window.pageYOffset || document.documentElement.scrollTop || 0);
        var y = base + e.data.encScrollTo - 90; // 상단 헤더 여백 보정
        window.scrollTo({ top: y < 0 ? 0 : y, behavior: 'smooth' });
        break;
      }
    }
  });
})();
</script>
<script>
/* 브레드크럼 3뎁스 = 활성 탭 라벨 동기화 (탭 전환·언어변경 반영) */
(function(){
  var crumb=document.querySelector('.breadcrumb .current');
  var g=document.querySelector('[data-tabs]');
  if(!crumb||!g) return;
  function sync(){var a=g.querySelector('.tab.active'); if(a){var s=(a.textContent||'').trim(); if(s) crumb.textContent=s;}}
  new MutationObserver(sync).observe(g,{subtree:true,childList:true,characterData:true,attributes:true,attributeFilter:['class']});
  sync();
})();
</script>
